<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>练习1-5 自学题库 · 手机版</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --panel: #fffdf8;
      --panel-soft: #edf7f4;
      --ink: #18212f;
      --muted: #667085;
      --line: #ded8cf;
      --accent: #108a80;
      --warm: #f4a62a;
      --warm-soft: #fff3d8;
      --good: #159764;
      --bad: #d94b4b;
      --shadow: 0 18px 48px rgba(33, 38, 48, .16);
    }

    body.dark {
      color-scheme: dark;
      --bg: #11161d;
      --panel: #1d2630;
      --panel-soft: #182f32;
      --ink: #f3f7fb;
      --muted: #aab5c2;
      --line: #33404e;
      --accent: #69d2c5;
      --warm: #ffd166;
      --warm-soft: #332917;
      --good: #73d8a4;
      --bad: #ff858a;
      --shadow: 0 18px 48px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html, body { min-height: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--panel-soft) 55%, transparent), transparent 280px),
        var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
    }

    button { font: inherit; }

    .mobile-shell {
      min-height: 100vh;
      padding: 12px 12px 20px;
    }

    .mobile-top {
      position: sticky;
      top: 0;
      z-index: 6;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      box-shadow: 0 10px 32px rgba(33, 38, 48, .08);
      backdrop-filter: blur(16px);
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--accent);
      font-size: .76rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    h1, h2, h3, h4, h5, p { margin-top: 0; }
    h1 {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .desktop-link {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--panel-soft);
      color: var(--accent);
      font-size: .86rem;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: .9rem;
    }

    .bar {
      height: 8px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel-soft);
    }

    .bar i {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--warm));
      transition: width .2s ease;
    }

    .stage {
      position: relative;
      margin-top: 12px;
      min-height: 62vh;
    }

    .slide {
      width: 100%;
      transition: transform .34s cubic-bezier(.22, .9, .24, 1), opacity .26s ease;
      will-change: transform, opacity;
    }

    .slide.enter-right { transform: translateX(110%); opacity: 0; }
    .slide.enter-left { transform: translateX(-110%); opacity: 0; }
    .slide.enter-pop { transform: scale(.985); opacity: .35; }
    .slide.active { transform: translateX(0) scale(1); opacity: 1; }
    .slide.exit-left { position: absolute; inset: 0; transform: translateX(-110%); opacity: 0; }
    .slide.exit-right { position: absolute; inset: 0; transform: translateX(110%); opacity: 0; }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .q-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 27px;
      border-radius: 8px;
      padding: 4px 9px;
      background: var(--panel-soft);
      color: var(--accent);
      font-size: .78rem;
      font-weight: 900;
    }

    .source {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
    }

    .stem {
      margin-bottom: 16px;
      font-size: 1.18rem;
      font-weight: 900;
      line-height: 1.72;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 9px;
    }

    .option {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: color-mix(in srgb, var(--panel) 90%, var(--panel-soft));
      color: var(--ink);
      text-align: left;
    }

    .key {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--accent);
      font-weight: 900;
    }

    .option.selected {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--panel-soft) 70%, var(--panel));
    }

    .option.correct {
      border-color: color-mix(in srgb, var(--good) 72%, var(--line));
      background: color-mix(in srgb, var(--good) 14%, var(--panel));
    }

    .option.wrong {
      border-color: color-mix(in srgb, var(--bad) 72%, var(--line));
      background: color-mix(in srgb, var(--bad) 12%, var(--panel));
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: .9rem;
    }

    .answer-panel {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      border-radius: 8px;
      padding: 12px;
      background: var(--panel-soft);
      animation: reveal .22s ease both;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .answer-panel div,
    .answer-panel b {
      border-radius: 8px;
      padding: 10px;
      background: var(--panel);
    }

    .answer-panel span {
      display: block;
      color: var(--muted);
      font-size: .82rem;
    }

    .answer-panel strong {
      display: block;
      margin-top: 4px;
    }

    .answer-panel b.ok { color: var(--good); }
    .answer-panel b.bad { color: var(--bad); }

    .explain-panel {
      margin-top: 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--line));
      border-left: 5px solid var(--accent);
      border-radius: 8px;
      padding: 14px;
      background: var(--panel);
      animation: reveal .22s ease both;
    }

    .explain-panel h4 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .formula-box {
      display: grid;
      gap: 8px;
      margin: 10px 0;
      border: 1px solid color-mix(in srgb, var(--warm) 42%, var(--line));
      border-radius: 8px;
      padding: 12px;
      background: linear-gradient(90deg, var(--warm-soft), color-mix(in srgb, var(--panel) 82%, transparent));
      overflow-x: auto;
    }

    .formula-box p,
    .analysis-box p {
      margin-bottom: 0;
      color: var(--muted);
    }

    .analysis-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: color-mix(in srgb, var(--panel) 78%, var(--panel-soft));
    }

    .analysis-box span {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-weight: 900;
    }

    .mobile-panel {
      position: sticky;
      bottom: 10px;
      z-index: 5;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .panel-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .panel-buttons button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--ink);
      font-weight: 900;
    }

    .panel-buttons button:last-child {
      border-color: transparent;
      background: var(--accent);
      color: #fff;
    }

    body.dark .panel-buttons button:last-child { color: #102024; }
    .panel-buttons button:disabled { opacity: .45; }

    .panel-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      color: var(--muted);
      font-size: .88rem;
    }

    @media (min-width: 761px) {
      .mobile-shell { max-width: 520px; margin: 0 auto; }
    }
  </style>
</head>

    function detectKnowledge(question) {
      const text = question.text + " " + (question.knowledge || "");
      if (/等级相关|Spearman/.test(text)) return KNOWLEDGE.rank;
      if (/DW|Durbin/.test(text)) return KNOWLEDGE.dw;
      if (/序列相关|自相关/.test(text)) return KNOWLEDGE.serial;
      if (/加权|WLS|权函数|权数|权重/.test(text)) return KNOWLEDGE.wls;
      if (/异方差/.test(text)) return /无偏|最小方差|OLS|普通最小二乘/.test(text) ? KNOWLEDGE.ols : KNOWLEDGE.hetero;
      if (/R\^2|R2|R²|拟合优度|判定系数|调整|SSE|SSR|SST/.test(text)) return KNOWLEDGE.r2;
      return KNOWLEDGE.default;
    }

    function answerText(question, keys) {
      if (!keys || keys.length === 0) return "待校对";
      return keys.map((key) => {
        const option = question.options.find((item) => item.key === key);
        return option ? option.key + ". " + option.label : key;
      }).join("；");
    }

    function isCorrect(question, selected) {
      if (!selected || selected.length !== question.answer.length) return false;
      return [...selected].sort().join("|") === [...question.answer].sort().join("|");
    }

    function makeAnalysis(question, knowledge) {
      const ans = answerText(question, question.answer);
      if (question.analysis) return "本题答案：" + ans + "。" + question.analysis;
      if (question.type === "判断题") {
        return question.answer.includes("A")
          ? "本题答案：" + ans + "。题干整体成立。" + knowledge.memory
          : "本题答案：" + ans + "。题干里有不准确或过于绝对的地方，所以不能判对。" + knowledge.memory;
      }
      return "本题答案：" + ans + "。" + knowledge.memory;
    }

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function answeredCount() {
      return activeQuestions.filter((question) => (selectedAnswers.get(question.id) || []).length).length;
    }

    function correctCount() {
      return activeQuestions.filter((question) => isCorrect(question, selectedAnswers.get(question.id) || [])).length;
    }

    function renderMath(target = stage) {
      if (window.MathJax?.typesetPromise) window.MathJax.typesetPromise([target]).catch(() => {});
    }

    function renderQuestion(question) {
      const selected = selectedAnswers.get(question.id) || [];
      const revealed = selected.length > 0;
      const correct = isCorrect(question, selected);
      const knowledge = detectKnowledge(question);
      const formulaBlock = knowledge.formulas.length ? '<div class="formula-box"><h4>' + knowledge.formulaName + '</h4><p>' + knowledge.formulaNote + '</p>' + knowledge.formulas.map((formula) => '<div>' + formula + '</div>').join("") + '</div>' : "";
      return '<article class="card">' +
        '<div class="q-head"><div><span class="pill">' + question.type + '</span></div><span class="source">原题 ' + question.id + '</span></div>' +
        '<div class="stem">' + question.text + '</div>' +
        '<div class="options">' + question.options.map((option) => {
          const isSelected = selected.includes(option.key);
          const isAnswer = question.answer.includes(option.key);
          const state = revealed ? (isAnswer ? "correct" : (isSelected ? "wrong" : "")) : "";
          return '<button class="option ' + (isSelected ? "selected" : "") + ' ' + state + '" type="button" data-answer="' + option.key + '"><span class="key">' + option.key + '</span><span>' + option.label + '</span></button>';
        }).join("") + '</div>' +
        '<div class="answer-panel" ' + (revealed ? "" : "hidden") + '><div><span>正确答案</span><strong>' + answerText(question, question.answer) + '</strong></div><div><span>你的选择</span><strong>' + answerText(question, selected) + '</strong></div><b class="' + (correct ? "ok" : "bad") + '">' + (correct ? "回答正确" : "再看一遍") + '</b></div>' +
        '<div class="explain-panel" ' + (revealed ? "" : "hidden") + '><h4>' + knowledge.formulaName + '</h4>' + formulaBlock + '<p>' + knowledge.explanation + '</p><div class="analysis-box"><span>本题解析</span><p>' + makeAnalysis(question, knowledge) + '</p></div></div>' +
        '<div class="mobile-panel"><div class="panel-buttons"><button type="button" data-prev ' + (currentIndex === 0 ? "disabled" : "") + '>上一题</button><button type="button" data-mode-toggle>' + (mode === "random" ? "完整" : "随机") + '</button><button type="button" data-theme>明暗</button><button type="button" data-next ' + (currentIndex === activeQuestions.length - 1 ? "disabled" : "") + '>下一题</button></div><div class="panel-stats"><span>已答 ' + answeredCount() + '</span><span>正确 ' + correctCount() + '</span></div></div>' +
        '</article>';
    }

    function updateTop() {
      const question = activeQuestions[currentIndex];
      progressText.textContent = "第 " + (currentIndex + 1) + " / " + activeQuestions.length + " 题";
      sectionText.textContent = mode === "random" ? "随机40题" : question.section;
      barFill.style.width = ((currentIndex + 1) / activeQuestions.length * 100) + "%";
    }

    function bindEvents(root = stage) {
      const question = activeQuestions[currentIndex];
      root.querySelectorAll("[data-answer]").forEach((button) => {
        button.addEventListener("click", () => {
          const current = selectedAnswers.get(question.id) || [];
          const key = button.dataset.answer;
          if (question.type === "多选题") {
            selectedAnswers.set(question.id, current.includes(key) ? current.filter((item) => item !== key) : [...current, key]);
          } else {
            selectedAnswers.set(question.id, [key]);
          }
          mount("same");
        });
      });
      root.querySelector("[data-prev]")?.addEventListener("click", () => go(-1));
      root.querySelector("[data-next]")?.addEventListener("click", () => go(1));
      root.querySelector("[data-mode-toggle]")?.addEventListener("click", () => {
        if (mode === "random") {
          activeQuestions = [...questionBank];
          mode = "full";
          currentIndex = 0;
          mount("prev");
          return;
        }
        activeQuestions = shuffle(questionBank).slice(0, Math.min(40, questionBank.length));
        mode = "random";
        currentIndex = 0;
        mount("next");
      });
      root.querySelector("[data-theme]")?.addEventListener("click", () => document.body.classList.toggle("dark"));
    }

    function mount(direction = "same") {
      updateTop();
      const oldSlide = stage.querySelector(".slide");
      const slide = document.createElement("section");
      slide.className = "slide " + (direction === "next" ? "enter-right" : direction === "prev" ? "enter-left" : "enter-pop");
      slide.innerHTML = renderQuestion(activeQuestions[currentIndex]);
      if (!oldSlide || direction === "same") {
        stage.innerHTML = "";
        stage.appendChild(slide);
        requestAnimationFrame(() => slide.classList.add("active"));
      } else {
        oldSlide.classList.add(direction === "next" ? "exit-left" : "exit-right");
        stage.appendChild(slide);
        requestAnimationFrame(() => slide.classList.add("active"));
        setTimeout(() => oldSlide.remove(), 360);
      }
      bindEvents(slide);
      renderMath(slide);
    }

    function go(step) {
      const next = currentIndex + step;
      if (next < 0 || next >= activeQuestions.length) return;
      currentIndex = next;
      mount(step > 0 ? "next" : "prev");
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") go(1);
      if (event.key === "ArrowLeft") go(-1);
    });

    stage.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    stage.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
      if (dx < 0) go(1);
      if (dx > 0) go(-1);
    }, { passive: true });

    mount("next");
  </script>
</body>
</html>
